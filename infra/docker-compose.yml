version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: synaxis-postgres
    environment:
      POSTGRES_DB: synaxis_game
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - synaxis_postgres_data:/var/lib/postgresql/data

volumes:
  synaxis_postgres_data: