# Frontend: format, analyze, test (FE-001.5 / task breakdown §5.1).
name: Flutter CI

on:
  push:
    branches: [main, master, develop]
    paths:
      - 'frontend/**'
      - '.github/workflows/flutter_ci.yml'
  pull_request:
    branches: [main, master, develop]
    paths:
      - 'frontend/**'
      - '.github/workflows/flutter_ci.yml'

defaults:
  run:
    working-directory: frontend

jobs:
  analyze-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Verify formatting
        run: dart format --set-exit-if-changed .

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test
