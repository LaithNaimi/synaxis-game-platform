<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;family=Plus+Jakarta+Sans:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "inverse-surface": "#f9f9ff",
                    "surface-dim": "#0b0e14",
                    "tertiary-dim": "#85e3ef",
                    "error-container": "#9f0519",
                    "surface": "#0b0e14",
                    "on-primary-fixed-variant": "#005b66",
                    "secondary": "#96a5ff",
                    "inverse-primary": "#006975",
                    "on-primary": "#00515b",
                    "on-tertiary": "#00646d",
                    "on-error-container": "#ffa8a3",
                    "primary-container": "#1cc2d6",
                    "on-secondary-container": "#c7cdff",
                    "error-dim": "#d7383b",
                    "on-secondary-fixed": "#1a2b7e",
                    "on-tertiary-fixed-variant": "#00666f",
                    "on-primary-container": "#00363d",
                    "tertiary-container": "#93f1fd",
                    "surface-container-high": "#1c2028",
                    "tertiary-fixed-dim": "#85e3ef",
                    "secondary-fixed-dim": "#b7c0ff",
                    "surface-tint": "#58e7fb",
                    "on-background": "#ecedf6",
                    "primary-fixed": "#58e7fb",
                    "primary-fixed-dim": "#45d8ed",
                    "tertiary-fixed": "#93f1fd",
                    "on-secondary": "#0f2176",
                    "primary-dim": "#45d8ed",
                    "on-primary-fixed": "#003c44",
                    "background": "#0b0e14",
                    "on-tertiary-fixed": "#00474d",
                    "tertiary": "#ccf9ff",
                    "on-tertiary-container": "#005b63",
                    "on-surface-variant": "#a9abb3",
                    "inverse-on-surface": "#52555c",
                    "on-surface": "#ecedf6",
                    "secondary-container": "#2f3f92",
                    "surface-container-low": "#10131a",
                    "surface-variant": "#22262f",
                    "secondary-fixed": "#c9cfff",
                    "on-error": "#490006",
                    "surface-bright": "#282c36",
                    "error": "#ff716c",
                    "outline": "#73757d",
                    "outline-variant": "#45484f",
                    "secondary-dim": "#8998f0",
                    "surface-container": "#161a21",
                    "surface-container-highest": "#22262f",
                    "on-secondary-fixed-variant": "#3a499c",
                    "primary": "#58e7fb",
                    "surface-container-lowest": "#000000"
            },
            "borderRadius": {
                    "DEFAULT": "1rem",
                    "lg": "2rem",
                    "xl": "3rem",
                    "full": "9999px"
            },
            "fontFamily": {
                    "headline": ["Space Grotesk"],
                    "body": ["Plus Jakarta Sans"],
                    "label": ["Plus Jakarta Sans"]
            }
          },
        },
      }
    </script>
<style>
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        display: inline-block;
        line-height: 1;
        text-transform: none;
        letter-spacing: normal;
        word-wrap: normal;
        white-space: nowrap;
        direction: ltr;
      }
      body {
        font-family: 'Plus Jakarta Sans', sans-serif;
        background-color: #0b0e14;
      }
      .glass-panel {
        background: rgba(34, 38, 47, 0.6);
        backdrop-filter: blur(20px);
      }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-background text-on-surface min-h-screen pb-32">
<!-- Top Navigation Anchor -->
<header class="fixed top-0 left-0 w-full z-50 flex items-center justify-between bg-cyan-900/60 backdrop-blur-xl dark:bg-cyan-950/60 rounded-full mt-4 mx-auto max-w-[92%] px-6 h-14 shadow-[0_0_20px_rgba(38,198,218,0.15)]">
<div class="flex items-center gap-2">
<button class="text-cyan-400 active:scale-95 duration-200 hover:bg-cyan-400/10 p-2 rounded-full">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
</div>
<h1 class="font-['Space_Grotesk'] tracking-[0.2em] uppercase text-sm font-bold text-cyan-400 dark:text-cyan-300">Synaxis</h1>
<div class="flex items-center gap-2">
<button class="text-cyan-400 active:scale-95 duration-200 hover:bg-cyan-400/10 p-2 rounded-full">
<span class="material-symbols-outlined" data-icon="timer">timer</span>
</button>
</div>
</header>
<main class="pt-28 px-6 max-w-4xl mx-auto">
<!-- Hero Section -->
<section class="mb-10 text-center md:text-left">
<h2 class="font-headline text-4xl md:text-5xl font-bold text-on-surface mb-3 tracking-tight">Set the Hearth</h2>
<p class="text-on-surface-variant font-body text-lg max-w-xl">Configure your shared learning space. Every detail is crafted for an ethereal experience.</p>
</section>
<!-- Main Form Container -->
<div class="glass-panel rounded-xl p-8 md:p-12 border border-outline-variant/10 shadow-2xl relative overflow-hidden">
<!-- Decorative atmospheric glow -->
<div class="absolute -top-24 -right-24 w-64 h-64 bg-primary/10 rounded-full blur-[100px]"></div>
<div class="absolute -bottom-24 -left-24 w-64 h-64 bg-secondary/10 rounded-full blur-[100px]"></div>
<form class="relative z-10 space-y-8">
<!-- Group 1: Identity -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-8 items-end">
<div class="space-y-3">
<label class="block text-primary font-headline text-sm font-bold tracking-widest uppercase px-1">Player Name</label>
<div class="relative group">
<input class="w-full bg-surface-container-low border-none rounded-xl px-5 py-4 text-on-surface placeholder:text-on-surface-variant/40 focus:ring-2 focus:ring-primary/40 focus:bg-surface-container-high transition-all outline-none" placeholder="Enter your celestial handle..." type="text"/>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-primary-dim/30 group-focus-within:text-primary transition-colors" data-icon="edit">edit</span>
</div>
</div>
<div class="space-y-3">
<label class="block text-primary font-headline text-sm font-bold tracking-widest uppercase px-1">CEFR Level</label>
<div class="relative">
<select class="w-full bg-surface-container-low border-none rounded-xl px-5 py-4 text-on-surface appearance-none focus:ring-2 focus:ring-primary/40 focus:bg-surface-container-high transition-all outline-none">
<option>A1 - Discovery</option>
<option>A2 - Voyager</option>
<option selected="">B1 - Explorer</option>
<option>B2 - Trailblazer</option>
<option>C1 - Master</option>
</select>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-primary-dim pointer-events-none" data-icon="expand_more">expand_more</span>
</div>
</div>
</div>
<!-- Group 2: Room Mechanics -->
<div class="grid grid-cols-1 sm:grid-cols-3 gap-6">
<div class="space-y-3">
<label class="block text-on-surface-variant font-headline text-xs font-bold tracking-widest uppercase px-1">Max Players</label>
<div class="relative">
<select class="w-full bg-surface-container-low border-none rounded-xl px-5 py-4 text-on-surface appearance-none focus:ring-2 focus:ring-primary/40 focus:bg-surface-container-high transition-all outline-none">
<option>2 Souls</option>
<option selected="">4 Souls</option>
<option>6 Souls</option>
<option>8 Souls</option>
</select>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-on-surface-variant/50 pointer-events-none" data-icon="group">group</span>
</div>
</div>
<div class="space-y-3">
<label class="block text-on-surface-variant font-headline text-xs font-bold tracking-widest uppercase px-1">Total Rounds</label>
<div class="relative">
<select class="w-full bg-surface-container-low border-none rounded-xl px-5 py-4 text-on-surface appearance-none focus:ring-2 focus:ring-primary/40 focus:bg-surface-container-high transition-all outline-none">
<option>3 Cycles</option>
<option selected="">5 Cycles</option>
<option>10 Cycles</option>
</select>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-on-surface-variant/50 pointer-events-none" data-icon="refresh">refresh</span>
</div>
</div>
<div class="space-y-3">
<label class="block text-on-surface-variant font-headline text-xs font-bold tracking-widest uppercase px-1">Round Duration</label>
<div class="relative">
<select class="w-full bg-surface-container-low border-none rounded-xl px-5 py-4 text-on-surface appearance-none focus:ring-2 focus:ring-primary/40 focus:bg-surface-container-high transition-all outline-none">
<option>30 Seconds</option>
<option selected="">60 Seconds</option>
<option>90 Seconds</option>
</select>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-on-surface-variant/50 pointer-events-none" data-icon="schedule">schedule</span>
</div>
</div>
</div>
<!-- Information Card (Bento Style) -->
<!-- CTA Button -->
<div class="pt-8 text-center md:text-right">
<button class="w-full md:w-auto inline-flex items-center justify-center gap-3 px-12 py-5 bg-gradient-to-br from-primary to-primary-container text-on-primary font-headline font-bold text-lg rounded-full shadow-[0_0_30px_rgba(88,231,251,0.3)] hover:shadow-[0_0_50px_rgba(88,231,251,0.5)] active:scale-95 transition-all duration-300" type="button">
                        Create Room
                        <span class="material-symbols-outlined" data-icon="rocket_launch">rocket_launch</span>
</button>
</div>
</form>
</div>
<!-- Footer Visual Hint -->
<div class="mt-12 flex flex-col items-center gap-4 opacity-40">
<div class="h-px w-24 bg-gradient-to-r from-transparent via-primary-dim to-transparent"></div>
<p class="font-body text-xs tracking-widest uppercase">Initializing Virtual Hearth</p>
</div>
</main>
<!-- Bottom Navigation Shell -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-6 py-4 bg-slate-900/80 backdrop-blur-2xl dark:bg-slate-950/80 rounded-t-[3rem] shadow-[0_-10px_40px_rgba(38,198,218,0.06)]">
<div class="flex flex-col items-center justify-center text-slate-400 px-5 py-2 hover:text-cyan-200 transition-all active:scale-90 duration-300">
<span class="material-symbols-outlined" data-icon="home">home</span>
<span class="font-['Plus_Jakarta_Sans'] text-[11px] font-semibold mt-1">Home</span>
</div>
<div class="flex flex-col items-center justify-center text-slate-400 px-5 py-2 hover:text-cyan-200 transition-all active:scale-90 duration-300">
<span class="material-symbols-outlined" data-icon="leaderboard">leaderboard</span>
<span class="font-['Plus_Jakarta_Sans'] text-[11px] font-semibold mt-1">Ranks</span>
</div>
<div class="flex flex-col items-center justify-center bg-gradient-to-br from-cyan-400 to-cyan-600 text-slate-900 rounded-full px-5 py-2 shadow-[0_0_15px_rgba(38,198,218,0.4)] active:scale-90 duration-300">
<span class="material-symbols-outlined" data-icon="settings">settings</span>
<span class="font-['Plus_Jakarta_Sans'] text-[11px] font-semibold mt-1">System</span>
</div>
<div class="flex flex-col items-center justify-center text-slate-400 px-5 py-2 hover:text-cyan-200 transition-all active:scale-90 duration-300">
<span class="material-symbols-outlined" data-icon="logout">logout</span>
<span class="font-['Plus_Jakarta_Sans'] text-[11px] font-semibold mt-1">Leave</span>
</div>
</nav>
<!-- Background Decorative Elements -->
<div class="fixed inset-0 -z-10 overflow-hidden pointer-events-none">
<div class="absolute top-[20%] right-[10%] w-[500px] h-[500px] rounded-full bg-cyan-900/20 blur-[150px]"></div>
<div class="absolute bottom-[10%] left-[5%] w-[400px] h-[400px] rounded-full bg-indigo-900/20 blur-[150px]"></div>
</div>
</body></html>
